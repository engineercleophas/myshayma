<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>For Shayma ✨</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- Night elements -->
    <div id="stars-container"></div>
    <div id="moon"></div>

    <!-- Day elements -->
    <div id="sun"></div>
    <div id="clouds-container"></div>

    <!-- Navigation Arrows -->
    <button id="prev-btn" class="nav-btn">&#8592;</button>
    <button id="next-btn" class="nav-btn">&#8594;</button>

    <!-- Section 1: Intro -->
    <section id="intro" class="slide active">
      <h1 id="her-name">Shayma</h1>
      <p id="her-subtitle">There is something I have been meaning to tell you...</p>

      <div id="her-photo-container">
        <img id="her-photo" src="Shayma.jpg" alt="Shayma">
      </div>
    </section>

    <!-- Section 2: Birthday -->
    <section id="birthday" class="slide">
      <h2>March 19th &hearts;</h2>
      <p>I know your birthday has passed, but some feelings are too special to rush...</p>
    </section>

    <!-- Section 3: Reasons -->
    <section id="reasons" class="slide">
      <h2>Why you mean so much to me &starf;</h2>
      <div id="cards-container"></div>
    </section>

    <!-- Section 4: Confession -->
    <section id="confession" class="slide">
      <div id="confession-container">

        <img id="cleophas-photo" src="Cleophas.jpg" alt="Cleophas"/>

        <div id="thought-bubbles">
          <div class="heart-bubble hb-1">♥</div>
          <div class="heart-bubble hb-2">♥</div>
          <div class="heart-bubble hb-3">♥</div>
        </div>

        <div id="shayma-heart-side">
          <svg viewBox="0 -20 200 210" xmlns="http://www.w3.org/2000/svg" id="heart-svg">
            <defs>
              <clipPath id="heartClip">
                <path d="M 100 175 C 60 150 5 115 5 70 C 5 35 28 8 58 8 C 75 8 90 16 100 28 C 110 16 125 8 142 8 C 172 8 195 35 195 70 C 195 115 140 150 100 175 Z"/>
              </clipPath>
              <linearGradient id="heartBorder" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff9ecd"/>
                <stop offset="50%" style="stop-color:#a8d8ff"/>
                <stop offset="100%" style="stop-color:#ff69b4"/>
              </linearGradient>
              <!-- Path for curved text — follows top of heart -->
              <path id="heartTextPath"
                d="M 5 70 C 5 35 28 8 58 8 C 75 8 90 16 100 28 C 110 16 125 8 142 8 C 172 8 195 35 195 70"/>
            </defs>

            <!-- Curved text -->
            <text font-size="11" fill="#ff9ecd" font-family="Georgia, serif" font-style="italic" letter-spacing="1">
              <textPath href="#heartTextPath" startOffset="50%" text-anchor="middle" dy="-18">
                Shayma... I like you with everything in me ♥
              </textPath>
            </text>

            <!-- Border heart -->
            <path d="M 100 175 C 60 150 5 115 5 70 C 5 35 28 8 58 8 C 75 8 90 16 100 28 C 110 16 125 8 142 8 C 172 8 195 35 195 70 C 195 115 140 150 100 175 Z"
              fill="none" stroke="url(#heartBorder)" stroke-width="6" id="heart-border-path"/>

            <!-- Photo clipped to heart -->
            <image href="Shayma-heart.jpg" x="0" y="0" width="200" height="190"
              preserveAspectRatio="xMidYMin slice" clip-path="url(#heartClip)"/>
          </svg>
        </div>

      </div>
      <p id="confession-text"></p>
      <p id="signed">-- Cleophas ✦</p>
    </section>

    <!-- Section 5: Ending -->
    <section id="ending" class="slide">
      <canvas id="shooting-star-canvas"></canvas>


      <p id="ending-text"></p>

      <div id="ending-choices" style="display:none;">
        <label class="choice-box" id="choice-yes">
          <input type="checkbox" id="yes-check"/>
          <span>Yes! 🤗⭐</span>
        </label>
        <label class="choice-box" id="choice-think">
          <input type="checkbox" id="think-check"/>
          <span>Lemme think about it... 🤔</span>
        </label>
      </div>

      <p id="convince-text" style="display:none;"></p>

      <div id="ending-heart-wrapper" style="display:none;">
        <div id="ending-heart-frame">
          <svg viewBox="0 -10 200 200" xmlns="http://www.w3.org/2000/svg" id="ending-heart-svg">
            <defs>
              <clipPath id="endingHeartClip">
                <path d="M 100 175 C 60 150 5 115 5 70 C 5 35 28 8 58 8 C 75 8 90 16 100 28 C 110 16 125 8 142 8 C 172 8 195 35 195 70 C 195 115 140 150 100 175 Z"/>
              </clipPath>
              <linearGradient id="endingHeartBorder" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff9ecd"/>
                <stop offset="50%" style="stop-color:#a8d8ff"/>
                <stop offset="100%" style="stop-color:#ff69b4"/>
              </linearGradient>
            </defs>

            <image href="ending-cleophas.jpg"
              x="85" y="-40"
              width="140" height="210"
              preserveAspectRatio="xMidYMid slice"
              clip-path="url(#endingHeartClip)"
              style="opacity: 0.92;"/>

            <image href="ending-shayma.jpg"
              x="-15" y="-10"
              width="120" height="180"
              preserveAspectRatio="xMidYMid slice"
              clip-path="url(#endingHeartClip)"
              style="transform-origin: 80px 90px; transform: rotate(4deg);"/>

            <path d="M 100 175 C 60 150 5 115 5 70 C 5 35 28 8 58 8 C 75 8 90 16 100 28 C 110 16 125 8 142 8 C 172 8 195 35 195 70 C 195 115 140 150 100 175 Z"
              fill="none" stroke="url(#endingHeartBorder)" stroke-width="6" id="ending-heart-border"/>
          </svg>
        </div>
        <p id="ending-signed">-- Cleophas ✦</p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
