<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>For Shayma ✨</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- Night elements -->
    <div id="stars-container"></div>
    <div id="moon"></div>

    <!-- Day elements -->
    <div id="sun"></div>
    <div id="clouds-container"></div>

    <!-- Navigation Arrows -->
    <button id="prev-btn" class="nav-btn">&#8592;</button>
    <button id="next-btn" class="nav-btn">&#8594;</button>

    <!-- Section 1: Intro -->
    <section id="intro" class="slide active">
      <h1 id="her-name">Shayma</h1>
      <p id="her-subtitle">There is something I have been meaning to tell you...</p>
    </section>

    <!-- Section 2: Birthday -->
    <section id="birthday" class="slide">
      <h2>March 19th &hearts;</h2>
      <p>I know your birthday has passed, but some feelings are too special to rush...</p>
    </section>

    <!-- Section 3: Reasons -->
    <section id="reasons" class="slide">
      <h2>Why you mean so much to me &starf;</h2>
      <div id="cards-container"></div>
    </section>

    <!-- Section 4: Confession -->
    <section id="confession" class="slide">
      <p id="confession-text"></p>
      <p id="signed">-- Cleophas &starf;</p>
    </section>

    <!-- Section 5: Ending -->
    <section id="ending" class="slide">
      <canvas id="shooting-star-canvas"></canvas>
      <p id="ending-text">Can I be your star? ⭐</p>
      <p id="ending-signed">-- Cleophas ✦</p>
    </section>

    <script src="script.js"></script>
  </body>
</html>
